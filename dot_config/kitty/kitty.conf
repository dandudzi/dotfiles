# vim:fileencoding=utf-8

# Theme -----------------------------------------------------------------------
# Load the palette first so the local URL color below can override the theme.
include macchiato.conf

# Startup ---------------------------------------------------------------------
# Keep the existing tmux-first workflow throughout Phase 1.
shell tmux new-session -A -s main

# Retained as-is. Direct-zsh integration will be reviewed in Phase 2.
shell_integration enabled

# Appearance ------------------------------------------------------------------
background_opacity 0.9
macos_thicken_font 0

# Fonts -----------------------------------------------------------------------
font_family JetBrains Mono
font_size 16.0
text_composition_strategy 0.1 0

# Use the dedicated Nerd Font only for glyph ranges used by prompts and tools.
symbol_map U+E000-U+E00A Symbols Nerd Font Mono
symbol_map U+E0A0-U+E0A2,U+E0B0-U+E0B3,U+E0C0-U+E0C8,U+E0CA,U+E0CC-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E62B Symbols Nerd Font Mono

# Scrollback ------------------------------------------------------------------
scrollback_lines 10000
scrollbar scrolled-and-hovered

# Window interface ------------------------------------------------------------
tab_bar_style hidden
macos_show_window_title_in menubar
hide_window_decorations titlebar-only
window_padding_width 0
window_margin_width 0

# Cursor and links ------------------------------------------------------------
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval -1
cursor_trail 1

detect_urls yes
url_color #0087bd

# Keyboard --------------------------------------------------------------------
map caps_lock send_key caps_lock

# Forward Cmd+1 through Cmd+9 to tmux as Ctrl+B followed by the window number.
map cmd+1 send_text all \x02\x31
map cmd+2 send_text all \x02\x32
map cmd+3 send_text all \x02\x33
map cmd+4 send_text all \x02\x34
map cmd+5 send_text all \x02\x35
map cmd+6 send_text all \x02\x36
map cmd+7 send_text all \x02\x37
map cmd+8 send_text all \x02\x38
map cmd+9 send_text all \x02\x39

# macOS input -----------------------------------------------------------------
# Preserve native Option-key character entry instead of treating Option as Alt.
macos_option_as_alt no

# Feedback and closing --------------------------------------------------------
enable_audio_bell no
visual_bell_duration 0.0
confirm_os_window_close 0
