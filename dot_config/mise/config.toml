[tools]
java = "latest"
node = "24"
lua = "5.1"
pnpm = "latest"
maven = "latest"
gradle = "latest"
kotlin = "latest"
rust = "latest"
uv = "latest"
"pipx:serena-agent" = { version = "latest", uvx_args = "--python 3.13" }
"npm:@playwright/mcp" = "latest"
"npm:mcp-mermaid" = { version = "latest", allow_builds = ["mcp-mermaid"] }
[settings]
idiomatic_version_file_enable_tools = ["node"]
minimum_release_age = "7d"
always_keep_download = false
always_keep_install = false
jobs = 8
http_timeout = "30s"
