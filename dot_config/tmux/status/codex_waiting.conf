# vim:set ft=tmux:
%hidden MODULE_NAME="codex_waiting"

set -g "@catppuccin_${MODULE_NAME}_icon" "󰚩 "
set -gF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_mauve}"
set -g "@catppuccin_${MODULE_NAME}_text" " #{@codex_waiting_count}"
set -gF "@catppuccin_status_${MODULE_NAME}_icon_fg" "#{E:@thm_crust}"
set -gF "@catppuccin_status_${MODULE_NAME}_icon_bg" "#{E:@thm_mauve}"
set -gF "@catppuccin_status_${MODULE_NAME}_text_fg" "#{E:@thm_fg}"
set -gF "@catppuccin_status_${MODULE_NAME}_text_bg" "#{E:@catppuccin_status_module_text_bg}"

# Keep the regular status modules connected, but close this standalone module
# with a rounded cap so the Codex counter is a pill on both sides.
set -g @catppuccin_status_right_separator ""
source -F "#{d:current_file}/../plugins/tmux/utils/status_module.conf"
set -g @catppuccin_status_right_separator " "
